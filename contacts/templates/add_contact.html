<!DOCTYPE html>
<html>
<head>
    <title>Add Contact</title>
</head>
<body>

<h1>Add New Contact</h1>

<form method="POST">
    {% csrf_token %}

    {% for field in form %}
        {{ field.label_tag }}<br>
        {{ field }}<br>
        {% for error in field.errors %}
            <span style="color: red;">{{ error }}</span><br>
        {% endfor %}
        <br>
    {% endfor %}

    <button type="submit">Save</button>
</form>

<br>
<a href="{% url 'contact_list' %}">Back</a>

</body>
</html>
